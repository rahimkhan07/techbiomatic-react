<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- White background -->
  <rect width="64" height="64" rx="10" fill="#ffffff"/>
  <!-- Red square bracket outline (matches logo) -->
  <rect x="6" y="6" width="52" height="52" rx="4" fill="none" stroke="#DC2626" stroke-width="5"/>
  <!-- Lowercase t — vertical stem -->
  <rect x="28.5" y="12" width="7" height="40" rx="3" fill="#DC2626"/>
  <!-- Lowercase t — crossbar -->
  <rect x="16" y="24" width="32" height="7" rx="3" fill="#DC2626"/>
</svg>
