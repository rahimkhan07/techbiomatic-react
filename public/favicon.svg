<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" fill="#ffffff"/>
  <!-- Top horizontal bar of bracket -->
  <rect x="12" y="12" width="76" height="11" rx="3" fill="#DC2626"/>
  <!-- Left vertical bar -->
  <rect x="12" y="12" width="11" height="76" rx="3" fill="#DC2626"/>
  <!-- Right vertical bar (stops 2/3 down, open at bottom) -->
  <rect x="77" y="12" width="11" height="58" rx="3" fill="#DC2626"/>
  <!-- t crossbar -->
  <rect x="31" y="37" width="40" height="10" rx="3" fill="#DC2626"/>
  <!-- t vertical stem -->
  <rect x="46" y="26" width="10" height="48" rx="4" fill="#DC2626"/>
  <!-- t angled notch top-left (diagonal cut) -->
  <polygon points="46,26 56,26 56,33 46,38" fill="#DC2626"/>
</svg>
